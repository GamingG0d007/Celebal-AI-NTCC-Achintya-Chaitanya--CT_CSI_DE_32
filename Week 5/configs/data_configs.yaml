# Superstore Data Analysis Configuration
pipeline:
  input:
    path: "data/Superstore.csv"
    format: "csv"
    delimiter: ","
    encoding: "utf-8"
    header: true
    infer_schema: false

  cleaning:
    output_path: "data/cleaned"
    format: "parquet"
    compression: "zstd"
    partition_by: ["Region", "Segment"]
    null_threshold: 0.7
    date_formats: ["yyyy-MM-dd", "yyyy/MM/dd"]
    fill_values:
      Discount: 0.0
      Profit: 0.0
      Postal Code: "UNKNOWN"
      Segment: "Consumer"
    validation_rules:
      Discount:
        max: 1.0
      Quantity:
        min: 0
      Sales:
        min: 0
    deduplication:
      enabled: true
      key_columns: ["Order ID"]
      keep: "first"

  analysis:
    input_path: "data/cleaned"
    output_path: "results"
    cache_data: true
    window_configs:
      regional: "Region"
      temporal: ["year", "month"]
      product: ["Category", "Sub-Category"]
    aggregations:
      - name: "sales_summary"
        group_by: []
        metrics: ["count", "sum", "avg", "stddev", "min", "max"]
        target_columns: ["Sales", "Profit", "Discount"]
      - name: "profitability"
        group_by: ["Region", "Segment"]
        metrics: ["count", "sum", "avg", "variance"]
        target_columns: ["Profit", "Sales"]
      - name: "product_stats"
        group_by: ["Product Name", "Category", "Sub-Category"]
        metrics: ["sum", "avg", "min", "max", "countDistinct"]
        target_columns: ["Quantity", "Sales", "Profit", "Discount", "Customer Name"]
      - name: "geographic_stats"
        group_by: ["State", "Region", "City"]
        metrics: ["count", "sum", "avg", "countDistinct"]
        target_columns: ["Sales", "Profit", "Product ID"]
      - name: "segment_analysis"
        group_by: ["Segment"]
        metrics: ["count", "sum", "avg", "skewness"]
        target_columns: ["Sales", "Discount", "Profit"]

  visualization:
    output_dir: "visualizations"
    plots:
      - name: "quarterly_trends"
        type: "bar"
        x: "Quarter"
        y: "Regional_Revenue"
        palette: "viridis"
        dpi: 400
      - name: "profitability_heatmap"
        type: "heatmap"
        index: "Region"
        columns: "Segment"
        values: "Avg_Profit_per_Order"
        cmap: "RdYlGn"
        annot: true
      - name: "top_products"
        type: "horizontal_bar"
        x: "Total_Sales"
        y: "Product Name"
        top_n: 10
        palette: "plasma"
      - name: "geographic_performance"
        type: "scatter"
        x: "Total_Sales"
        y: "Avg_Profit"
        size: "Transactions"
        color: "Transactions"
        cmap: "viridis"
      - name: "sales_profit_distribution"
        type: "scatter"
        x: "Total_Sales"
        y: "Avg_Unit_Profit"
        size: "Units_Sold"
        color: "Units_Sold"
        cmap: "plasma"
    style:
      theme: "dark_background"
      figure_size: [12, 8]
      font_family: "monospace"
      facecolor: "#121212"
      axes_facecolor: "#1e1e1e"
      grid_color: "#333333"
      dpi: 400

  spark:
    app_name: "Superstore_Analytics"
    executor_memory: "8g"
    driver_memory: "4g"
    shuffle_partitions: 200
    adaptive_execution: true
    serializer: "org.apache.spark.serializer.KryoSerializer"
    log_level: "WARN"

  monitoring:
    track_nulls: true
    track_duplicates: true
    track_schema_changes: true
    alert_thresholds:
      null_percentage: 0.1
      duplicate_percentage: 0.05
      data_volume_change: 0.2